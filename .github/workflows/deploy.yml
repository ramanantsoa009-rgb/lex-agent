# .github/workflows/deploy.yml

name: Build & Deploy to Nexsus VPS

# Se declenche uniquement sur un push vers la branche main
on:
  push:
    branches:
      - main

# Variables globales
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # -------------------------------------------------
  # JOB 1 : TESTS
  # Lance les tests Python avant de construire l'image
  # Si les tests echouent, rien ne se deploie
  # -------------------------------------------------
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dependances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Lancer les tests
        run: |
          pytest tests/ -v

  # -------------------------------------------------
  # JOB 2 : BUILD & PUSH
  # Construit l'image Docker et la pousse sur ghcr.io
  # Ne se lance que si les tests sont passes
  # -------------------------------------------------
  build-and-push:
    name: Build & Push docker image to GitHub Container Registry
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Login GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Preparer les tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build et Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  # -------------------------------------------------
  # JOB 3 : DEPLOY
  # Se connecte en SSH au VPS et remplace le container
  # Ne se lance que si le build est passe
  # -------------------------------------------------
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deployer via SSH sur Nexsus VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            # Se connecter au registry GitHub depuis le VPS
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Aller dans le dossier du projet
            cd /opt/lex-agent

            # Telecharger la nouvelle image
            docker pull ghcr.io/${{ github.repository }}:latest

            # Arreter l'ancien container
            docker compose down

            # Demarrer le nouveau container
            docker compose up -d

            # Supprimer les vieilles images
            docker image prune -f

            echo "Deploiement termine"